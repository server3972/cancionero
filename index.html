```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancionero Pro Remastered</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#040404;
    color:#39ff88;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:320px;
    background:#081108;
    border-right:2px solid #16a34a;
    display:flex;
    flex-direction:column;
}

.logo{
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#7dffb1;
    border-bottom:1px solid #14532d;
    text-shadow:0 0 12px #39ff88;
}

.search{
    padding:15px;
}

.search input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #1f8f4d;
    background:#021402;
    color:#7dffb1;
    font-size:16px;
    outline:none;
}

.song-list{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.song-item{
    background:#0c1c12;
    border:1px solid #14532d;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
    cursor:pointer;
    transition:0.2s;
}

.song-item:hover{
    transform:scale(1.02);
    background:#12311d;
    box-shadow:0 0 12px #16a34a;
}

.song-title{
    font-size:18px;
    font-weight:bold;
    color:#b7ffd3;
}

.song-tone{
    margin-top:6px;
    color:#5dff9d;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    background:#081108;
    border-bottom:2px solid #14532d;
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

button{
    background:#16a34a;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#22c55e;
    transform:translateY(-1px);
}

.editor{
    flex:1;
    padding:20px;
    overflow:auto;
}

.song-info{
    display:grid;
    grid-template-columns:2fr 2fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.song-info input{
    padding:14px;
    border-radius:12px;
    border:1px solid #14532d;
    background:#021402;
    color:#7dffb1;
    font-size:18px;
    outline:none;
}

textarea{
    width:100%;
    height:72vh;
    resize:none;
    border-radius:14px;
    border:2px solid #1f8f4d;
    background:#021402;
    color:#8dffbd;
    padding:25px;
    font-size:24px;
    line-height:1.9;
    font-family:Consolas, monospace;
    outline:none;
    text-shadow:0 0 6px #39ff88;
}

/* TELEPROMPTER */

.teleprompter{
    position:fixed;
    inset:0;
    background:black;
    color:#7dffb1;
    display:none;
    z-index:999;
    overflow:auto;
    padding:80px;
    white-space:pre-wrap;
    font-size:48px;
    line-height:2.2;
    text-shadow:0 0 10px #39ff88;
}

.prompter-controls{
    position:fixed;
    top:15px;
    right:15px;
    display:flex;
    gap:10px;
    z-index:1000;
}

/* RESPONSIVE */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    height:260px;
}

.song-info{
    grid-template-columns:1fr;
}

textarea{
    height:55vh;
    font-size:18px;
}

.topbar{
    justify-content:center;
}

}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
🎸 Cancionero Pro
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Buscar canción...">
</div>

<div class="song-list" id="songList"></div>

</div>

<div class="main">

<div class="topbar">

<button onclick="newSong()">Nueva</button>
<button onclick="saveSong()">Guardar</button>
<button onclick="deleteSong()">Borrar</button>
<button onclick="transpose(1)">⬆ Medio tono</button>
<button onclick="transpose(-1)">⬇ Medio tono</button>
<button onclick="transpose(2)">⬆ Tono</button>
<button onclick="transpose(-2)">⬇ Tono</button>
<button onclick="openPrompter()">🎤 Teleprompter</button>

</div>

<div class="editor">

<div class="song-info">
<input type="text" id="songTitle" placeholder="Título de la canción">
<input type="text" id="songArtist" placeholder="Artista">
<input type="text" id="songTone" placeholder="Tono">
</div>

<textarea id="songContent" placeholder="Pega aquí letra y acordes..."></textarea>

</div>

</div>

</div>

<!-- TELEPROMPTER -->

<div class="teleprompter" id="teleprompter">

<div class="prompter-controls">
<button onclick="startScroll()">▶ Play</button>
<button onclick="stopScroll()">⏸ Stop</button>
<button onclick="speedUp()">⚡ +</button>
<button onclick="speedDown()">🐢 -</button>
<button onclick="closePrompter()">❌ Cerrar</button>
</div>

<div id="prompterContent"></div>

</div>

<script>

let songs = JSON.parse(localStorage.getItem("cancioneroSongs")) || [];
let currentSong = null;
let scrollInterval = null;
let scrollSpeed = 1;

const notes = [
"C","C#","D","D#","E","F",
"F#","G","G#","A","A#","B"
];

function renderSongs(){

const songList = document.getElementById("songList");
songList.innerHTML = "";

const search = document
.getElementById("searchInput")
.value
.toLowerCase();

songs
.filter(song => song.title.toLowerCase().includes(search))
.forEach(song => {

const div = document.createElement("div");

    div.className = "song-item";

    div.innerHTML = `
        <div class="song-title">${song.title}</div>
        <div class="song-tone">🎵 ${song.artist || "Canción guardada"}</div>
    `;

    div.onclick = () => loadSong(song.id);

    songList.appendChild(div);

});

}

function saveSong(){

const title = document.getElementById("songTitle").value.trim();
const artist = document.getElementById("songArtist").value.trim();
const tone = document.getElementById("songTone").value.trim();
const content = document.getElementById("songContent").value;

if(!title){
alert("Pon título a la canción 🎸");
return;
}

if(currentSong){

const song = songs.find(s => s.id === currentSong);

song.title = title;
song.artist = artist;
song.tone = tone;
song.content = content;

}else{

songs.push({
id:Date.now(),
title,
artist,
tone,
content
});

}

localStorage.setItem(
"cancioneroSongs",
JSON.stringify(songs)
);

renderSongs();

alert("Canción guardada 🎸");

}

function loadSong(id){

const song = songs.find(s => s.id === id);
if(!song) return;

currentSong = id;

document.getElementById("songTitle").value = song.title || "";
document.getElementById("songArtist").value = song.artist || "";
document.getElementById("songTone").value = song.tone || "";
document.getElementById("songContent").value = song.content || "";

}

function newSong(){

currentSong = null;

document.getElementById("songTitle").value = "";
document.getElementById("songArtist").value = "";
document.getElementById("songTone").value = "";
document.getElementById("songContent").value = "";

}

function deleteSong(){

if(!currentSong){
alert("No hay canción seleccionada");
return;
}

if(!confirm("¿Borrar canción?")) return;

songs = songs.filter(s => s.id !== currentSong);

localStorage.setItem(
"cancioneroSongs",
JSON.stringify(songs)
);

newSong();
renderSongs();

}

function transpose(step){

let content = document.getElementById("songContent").value;

notes.forEach((note,index)=>{

const regex = new RegExp(`\\b${note}(?![a-zA-Z#])\\b`,"g");

const newNote = notes[
(index + step + notes.length) % notes.length
];

content = content.replace(regex,newNote);

});

document.getElementById("songContent").value = content;

}

function openPrompter(){

const content = document.getElementById("songContent").value;

document.getElementById("prompterContent")
.textContent = content;

document.getElementById("teleprompter")
.style.display = "block";

}

function closePrompter(){

stopScroll();

document.getElementById("teleprompter")
.style.display = "none";

}

function startScroll(){

stopScroll();

const teleprompter = document.getElementById("teleprompter");

scrollInterval = setInterval(()=>{
teleprompter.scrollTop += scrollSpeed;
},30);

}

function stopScroll(){
clearInterval(scrollInterval);
}

function speedUp(){
scrollSpeed += 0.5;
}

function speedDown(){
if(scrollSpeed > 0.5){
scrollSpeed -= 0.5;
}
}

document
.getElementById("searchInput")
.addEventListener("input",renderSongs);

renderSongs();

</script>

</body>
</html>
```
