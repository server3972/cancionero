<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cancionero Terminal Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#050505;
    color:#39ff88;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:260px;
    background:#0d0d0d;
    border-right:2px solid #39ff88;
    padding:15px;
    overflow-y:auto;
}

.sidebar h2{
    margin-bottom:15px;
    text-align:center;
}

.sidebar input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#000;
    color:#39ff88;
    border:1px solid #39ff88;
}

.song-item{
    padding:10px;
    border:1px solid #39ff88;
    margin-bottom:8px;
    cursor:pointer;
    transition:0.2s;
}

.song-item:hover{
    background:#39ff88;
    color:#000;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:10px;
    border-bottom:2px solid #39ff88;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    background:#0d0d0d;
}

.header button{
    padding:10px;
    background:#000;
    color:#39ff88;
    border:1px solid #39ff88;
    cursor:pointer;
    transition:0.2s;
}

.header button:hover{
    background:#39ff88;
    color:#000;
}

textarea{
    flex:1;
    width:100%;
    background:#050505;
    color:#39ff88;
    border:none;
    outline:none;
    resize:none;
    padding:20px;
    font-size:20px;
    line-height:1.8;
}

.teleprompter{
    font-size:38px;
    line-height:2.5;
}

</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2>🎸 Cancionero Pro</h2>

        <input type="text" id="songTitle" placeholder="Nombre de la canción">

        <div id="songList"></div>
    </div>

    <div class="main">

        <div class="header">

            <button onclick="newSong()">Nueva</button>

            <button onclick="saveSong()">Guardar</button>

            <button onclick="deleteSong()">Borrar</button>

            <button onclick="transpose(1)">⬆ Medio tono</button>

            <button onclick="transpose(-1)">⬇ Medio tono</button>

            <button onclick="transpose(2)">⬆ Tono</button>

            <button onclick="transpose(-2)">⬇ Tono</button>

            <button onclick="toggleTeleprompter()">🎤 Teleprompter</button>

        </div>

<textarea id="songContent">

</textarea>

    </div>

</div>

<script>

const notes = [
"C","C#","D","D#","E","F",
"F#","G","G#","A","A#","B"
];

let songs = JSON.parse(localStorage.getItem("songs")) || {};

function renderSongs(){

    const songList = document.getElementById("songList");

    songList.innerHTML = "";

    for(let title in songs){

        const div = document.createElement("div");

        div.className = "song-item";

        div.innerText = title;

        div.onclick = ()=>loadSong(title);

        songList.appendChild(div);
    }
}

function saveSong(){

    const title = document.getElementById("songTitle").value;

    const content = document.getElementById("songContent").value;

    if(title.trim()=="") return;

    songs[title] = content;

    localStorage.setItem("songs", JSON.stringify(songs));

    renderSongs();
}

function loadSong(title){

    document.getElementById("songTitle").value = title;

    document.getElementById("songContent").value = songs[title];
}

function deleteSong(){

    const title = document.getElementById("songTitle").value;

    delete songs[title];

    localStorage.setItem("songs", JSON.stringify(songs));

    renderSongs();

    newSong();
}

function newSong(){

    document.getElementById("songTitle").value = "";

    document.getElementById("songContent").value = "";
}

function transpose(step){

    let content = document.getElementById("songContent").value;

    notes.forEach((note,index)=>{

        const regex = new RegExp(`\\b${note}\\b`,"g");

        const newNote =
        notes[(index + step + notes.length) % notes.length];

        content = content.replace(regex,newNote);
    });

    document.getElementById("songContent").value = content;
}

let teleprompter = false;
let scrollInterval;

function toggleTeleprompter(){

    const textarea = document.getElementById("songContent");

    teleprompter = !teleprompter;

    textarea.classList.toggle("teleprompter");

    if(teleprompter){

        scrollInterval = setInterval(()=>{

            textarea.scrollTop += 1;

        },80);

    }else{

        clearInterval(scrollInterval);
    }
}

renderSongs();

</script>

</body>
</html>
